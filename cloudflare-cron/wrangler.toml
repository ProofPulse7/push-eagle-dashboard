name = "push-eagle-cron-pinger"
main = "src/worker.js"
compatibility_date = "2024-09-23"

[triggers]
crons = ["* * * * *"]

[vars]
APP_URL = "https://push-eagle-dashboard.vercel.app"
PROCESS_CAMPAIGNS_URL = "https://push-eagle-dashboard.vercel.app/api/cron/process-campaigns"
PROCESS_AUTOMATIONS_URL = "https://push-eagle-dashboard.vercel.app/api/cron/process-automations"
PROCESS_ABANDONED_CART_URL = "https://push-eagle-dashboard.vercel.app/api/cron/process-abandoned-cart"
PROCESS_INGESTION_URL = "https://push-eagle-dashboard.vercel.app/api/cron/process-ingestion"
CAMPAIGN_SHARDS = "4"
AUTOMATION_SHARDS = "6"
ABANDONED_CART_SHARDS = "2"
INGESTION_SHARDS = "4"
MAX_CAMPAIGNS = "25"
MAX_BATCHES = "20"
MAX_AUTOMATION_JOBS = "200"
MAX_AUTOMATION_CONCURRENT = "80"
MAX_ABANDONED_CART_JOBS = "200"
MAX_ABANDONED_CART_CONCURRENT = "80"
MAX_INGESTION_JOBS = "1000"
MAX_INGESTION_CONCURRENT = "100"
